<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- This is not a functioning calculator, to make it function we will use javascript  -->
<!-- find the functioning calculator in the next repo "A Functioning Calculator" -->
<div class="calculator">
    <div class="display">0</div>

    <div class="buttons">
        <button>C</button>
        <button>%</button>
        <button>⌫</button>
        <button>/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>

        <button class="zero">0</button>
        <button>.</button>
        <button class="equal">=</button>
    </div>
</div>

<footer>

</footer>

</body>

</html>
